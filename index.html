<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Analytics</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="container">
        <h1>Store Analytics</h1>

        <section class="add-product-section">
            <h2>Add Product</h2>
            <form id="add-product-form">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" name="category" required>
                        <option value="Electronics">Electronics</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Books">Books</option>
                        <option value="Clothing">Clothing</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="price">Price *</label>
                    <input type="number" id="price" name="price" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="quantities">Warehouse Quantities (comma-separated) *</label>
                    <input type="text" id="quantities" name="quantities" placeholder="e.g., 5, 3, 2" required>
                </div>

                <div class="form-group">
                    <label for="specs">Specifications (key=value, key=value)</label>
                    <input type="text" id="specs" name="specs" placeholder="e.g., color=red, size=XL">
                </div>

                <button type="submit" id="add-btn">Add Product</button>
            </form>
        </section>

        <hr>

        <section class="filters-section" style="display: flex; gap: 20px; margin-bottom: 20px;">
            <div class="form-group" style="flex: 1;">
                <label>Filter by name:</label>
                <input type="text" id="search-input" placeholder="Search products...">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Sort by:</label>
                <select id="sort-select">
                    <option value="name">Name</option>
                    <option value="price">Price</option>
                    <option value="quantity">Quantity</option>
                </select>
            </div>
        </section>

        <section class="display-section">
            <div id="product-list" class="product-grid"></div>
        </section>
    </div>

    <script>
        var exports = {};
    </script>
    
    <script type="module" src="./dist/task2.js"></script>
</body>
</html>
